<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ivo Barbosa - Info</title>
    <link rel="stylesheet" href="/style/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">

<body>

    <div class="retangulo-maior">
        <div class="theme-selector">
            <label class="theme-option">
                <span class="label-text">DARK</span>
                <input type="radio" name="theme" value="dark">
                <span class="checkmark"></span>
            </label>
            <div class="divisor-vertical"></div>
            <label class="theme-option">
                <span class="label-text">LIGHT</span>
                <input type="radio" name="theme" value="light" checked>
                <span class="checkmark"></span>
            </label>
        </div>

    <div class="retangulo-menor_info">
    <div class="info-header">
        <a href="index.html" class="btn-back">< Back</a>
    </div>

    <img src="/assets/spray-fundo.png" class="imagem-centro" alt="imagem de fundo">

    <div class="info-container-linha1">
    <h1 class="info-title">ABOUT ME</h1>
    <!-- Conteúdo do card N1 -->
    <div class="info-card">
        
        <p class="card-num">05</p>
        
        <div class="card-info-group">
            <p class="card-desc">Years of ERP expertise</p> 
            <!--adicionar imagem corretamente após MVP concluido
            <img src="/assets/grafico linha_barras aba info 1.png" alt="linha decorativa" class="grafico-linha"> 
            -->

    </div>
    <!-- Conteúdo do card N2 -->
    <div class="info-card">
        
        <p class="card-num">+100</p>
        
        <div class="card-info-group">
            <p class="card-desc">Projects completed</p> 
            <!--adicionar imagem corretamente após MVP concluido
            <img src="/assets/grafico linha_barras aba info 2.png" alt="linha decorativa" class="grafico-linha"> 
            -->

    </div>
</div>

    <script src="script.js"></script>
